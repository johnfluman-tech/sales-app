<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intransit Sales Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1b2a;
  --navy-light: #162032;
  --navy-mid: #1e2f42;
  --blue: #1a6fb5;
  --blue-bright: #2589d8;
  --accent: #e8a020;
  --accent-dim: #b87c14;
  --red: #c0392b;
  --orange: #d35400;
  --green: #1e8449;
  --gray: #8a9bb0;
  --gray-light: #b8c4d0;
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.04);
  --text: #e8edf2;
  --text-dim: #8a9bb0;
  --text-muted: #546478;
  --surface: #162032;
  --surface-hover: #1e2f42;
  --yellow-bg: rgba(232,160,32,0.08);
  --font-main: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── LOGIN ─────────────────────────────────────────────────── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--navy);
}

.login-box {
  width: 360px;
  padding: 48px 40px;
  background: var(--navy-light);
  border: 1px solid var(--border);
}

.login-logo {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.login-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 36px;
  line-height: 1.6;
}

.login-divider {
  width: 32px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 32px;
}

.google-btn {
  width: 100%;
  padding: 13px 20px;
  background: var(--blue);
  border: none;
  color: white;
  font-family: var(--font-main);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.15s;
  letter-spacing: 0.02em;
}
.google-btn:hover { background: var(--blue-bright); }
.google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

.login-note {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  font-family: var(--font-mono);
}

/* ── APP SHELL ─────────────────────────────────────────────── */
#app { display: none; height: 100vh; flex-direction: row; }
#app.visible { display: flex; }

/* ── SIDEBAR ────────────────────────────────────────────────── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--navy-light);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-brand {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sidebar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.sidebar-user {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.sidebar-user-name {
  color: var(--text);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sidebar-user-role {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.nav-section-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
  padding: 12px 18px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.1s;
  border-left: 2px solid transparent;
}
.nav-item:hover { background: var(--surface-hover); color: var(--text); }
.nav-item.active { background: var(--surface-hover); color: var(--text); border-left-color: var(--accent); }
.nav-item .nav-icon { font-size: 14px; width: 16px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--blue);
  color: white;
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 6px;
  border-radius: 2px;
  min-width: 20px;
  text-align: center;
}
.nav-badge.red { background: var(--red); }
.nav-badge.orange { background: var(--orange); }

.sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--border);
}

.signout-btn {
  width: 100%;
  padding: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-main);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.signout-btn:hover { border-color: var(--gray); color: var(--text); }

/* ── MAIN PANEL ─────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.topbar-search {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 13px;
  padding: 7px 12px;
  width: 240px;
  outline: none;
}
.topbar-search::placeholder { color: var(--text-muted); }
.topbar-search:focus { border-color: var(--blue); }

.filter-btn {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

/* ── CONTENT AREA ────────────────────────────────────────────── */
.content {
  flex: 1;
  overflow: hidden;
  display: flex;
}

/* ── ACCOUNT TABLE ────────────────────────────────────────────── */
.account-list-panel {
  flex: 1;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  min-width: 0;
}

.table-wrap { width: 100%; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead tr {
  background: var(--navy-mid);
  position: sticky;
  top: 0;
  z-index: 10;
}

thead th {
  padding: 10px 14px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  text-transform: uppercase;
  font-weight: 400;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
thead th:hover { color: var(--text-dim); }

tbody tr {
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.08s;
}
tbody tr:hover { background: var(--surface-hover); }
tbody tr.selected { background: var(--navy-mid); border-left: 2px solid var(--accent); }

td {
  padding: 10px 14px;
  vertical-align: middle;
  color: var(--text);
}

.td-name {
  font-weight: 500;
  max-width: 240px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.td-contact {
  color: var(--text-dim);
  font-size: 12px;
  max-width: 160px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.td-mono {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

.td-amount {
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: right;
}

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.05em;
  white-space: nowrap;
  border-radius: 2px;
}
.status-active { background: rgba(30,132,73,0.2); color: #52c27a; }
.status-dormant { background: rgba(44,44,44,0.4); color: #888; }
.status-high-value { background: rgba(192,57,43,0.2); color: #e74c3c; }
.status-at-risk { background: rgba(211,84,0,0.2); color: #e67e22; }
.status-monitor { background: rgba(180,140,0,0.2); color: #d4ac0d; }
.status-declining { background: rgba(192,57,43,0.15); color: #e57a72; }

/* ── ACCOUNT DETAIL PANEL ─────────────────────────────────────── */
.detail-panel {
  width: 420px;
  min-width: 420px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--navy-light);
}

.detail-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  gap: 8px;
}

.detail-empty-icon { font-size: 32px; opacity: 0.3; }
.detail-empty-text { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; }

.detail-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.detail-account-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
}

.detail-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.detail-meta-item {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}

.detail-meta-item span {
  color: var(--text-dim);
}

/* ── CONTACT NOTES ──────────────────────────────────────── */
.cnote-log { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
.cnote-entry { padding: 8px 10px; background: var(--navy-mid); border: 1px solid var(--border); border-left: 3px solid var(--blue-bright); font-size: 12px; line-height: 1.5; }
.cnote-entry-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-bottom: 3px; display: flex; gap: 8px; }
.cnote-type-badge { font-size: 9px; padding: 1px 5px; border-radius: 2px; background: rgba(52,152,219,0.15); color: var(--blue-bright); font-family: var(--font-mono); letter-spacing: 0.05em; }
.cnote-type-badge.email { background: rgba(39,174,96,0.15); color: #52c27a; }
.cnote-type-badge.meeting { background: rgba(155,89,182,0.15); color: #a29bfe; }
.cnote-type-badge.note { background: rgba(180,140,0,0.2); color: #d4ac0d; }
.cnote-form { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.cnote-row { display: flex; gap: 6px; }
.cnote-type-sel { flex: 0 0 90px; font-size: 11px; padding: 5px 6px; background: var(--navy-mid); border: 1px solid var(--border); color: var(--text); border-radius: 2px; font-family: var(--font-mono); }
.cnote-text-input { flex: 1; font-size: 11px; padding: 5px 8px; background: var(--navy-mid); border: 1px solid var(--border); color: var(--text); border-radius: 2px; resize: vertical; min-height: 52px; font-family: var(--font-sans); line-height: 1.5; }
.cnote-save-btn { align-self: flex-end; padding: 5px 14px; background: var(--blue); color: #fff; border: none; font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.05em; cursor: pointer; border-radius: 2px; }
.cnote-save-btn:hover { background: var(--blue-bright); }
/* ── AI NEXT BEST ACTION ─────────────────────────────────── */
.nba-btn { width: 100%; padding: 8px 12px; background: linear-gradient(135deg, rgba(52,152,219,0.15), rgba(155,89,182,0.1)); border: 1px solid var(--blue); color: var(--blue-bright); font-size: 11px; font-family: var(--font-mono); letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s; }
.nba-btn:hover { background: rgba(52,152,219,0.25); }
.nba-result { margin-top: 10px; padding: 12px 14px; background: rgba(52,152,219,0.07); border: 1px solid rgba(52,152,219,0.3); border-left: 3px solid var(--blue-bright); font-size: 12px; line-height: 1.7; color: var(--text-dim); }
.nba-result-header { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.15em; color: var(--blue-bright); margin-bottom: 8px; }
.nba-action-item { display: flex; gap: 8px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.nba-action-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.nba-action-num { font-family: var(--font-mono); font-size: 10px; color: var(--blue-bright); flex-shrink: 0; padding-top: 1px; }
/* ── END NEW CSS ─────────────────────────────────────────── */

.detail-contact-card {
  margin: 14px 20px 0;
  padding: 12px 14px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  flex-shrink: 0;
}

.contact-card-name { font-weight: 500; font-size: 13px; color: var(--text); }
.contact-card-title { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.contact-card-links { display: flex; gap: 10px; margin-top: 8px; }

.contact-link {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--blue-bright);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.contact-link:hover { color: var(--accent); }

/* Revenue mini chart */
.revenue-strip {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.revenue-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.revenue-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 40px;
}

.rev-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
.rev-bar {
  width: 100%;
  background: var(--blue);
  min-height: 2px;
  transition: height 0.3s;
  position: relative;
}
.rev-bar.current-year { background: var(--accent); }
.rev-bar-year { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }

/* Detail tabs */
.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.detail-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
}
.detail-tab:hover { color: var(--text-dim); }
.detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

/* ── NOTES ────────────────────────────────────────────────────── */
.note-entry {
  margin-bottom: 12px;
  padding: 12px 14px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
}

.note-entry.locked { border-left-color: var(--text-muted); }

.note-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.note-author {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.05em;
}

.note-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

.note-status-pill {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 2px;
  letter-spacing: 0.05em;
}

.note-locked-icon {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.note-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}

.note-empty {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding: 24px 0;
  letter-spacing: 0.08em;
}

/* ── NOTE INPUT ────────────────────────────────────────────────── */
.note-input-area {
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  flex-shrink: 0;
  background: var(--navy-light);
}

.note-input-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.note-textarea {
  width: 100%;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 13px;
  padding: 10px 12px;
  resize: none;
  height: 72px;
  outline: none;
  line-height: 1.5;
}
.note-textarea:focus { border-color: var(--blue); }
.note-textarea::placeholder { color: var(--text-muted); }

.note-controls {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  align-items: center;
}

.note-select {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  outline: none;
  cursor: pointer;
}
.note-select:focus { border-color: var(--blue); }

.note-date-input {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  outline: none;
  width: 130px;
}
.note-date-input:focus { border-color: var(--blue); }

.save-note-btn {
  margin-left: auto;
  padding: 7px 18px;
  background: var(--accent);
  border: none;
  color: var(--navy);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  cursor: pointer;
  font-weight: 500;
  transition: background 0.15s;
}
.save-note-btn:hover { background: #f0b030; }
.save-note-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

/* ── EMAIL DRAFT ────────────────────────────────────────────────── */
.email-draft-area { padding: 0; }

.email-gen-btn {
  width: 100%;
  padding: 12px;
  background: var(--blue);
  border: none;
  color: white;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  cursor: pointer;
  margin-bottom: 14px;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.email-gen-btn:hover { background: var(--blue-bright); }
.email-gen-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

.email-spinner {
  width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}
.email-spinner.visible { display: block; }

@keyframes spin { to { transform: rotate(360deg); } }

.email-subject-wrap {
  margin-bottom: 10px;
}

.email-field-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.email-subject-input {
  width: 100%;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
}
.email-subject-input:focus { border-color: var(--blue); }

.email-body-textarea {
  width: 100%;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-main);
  font-size: 13px;
  padding: 10px 12px;
  resize: vertical;

/* ── ATTACK PLAN KANBAN ───────────────────────────────────── */
.apk-board { display:flex; flex-direction:column; height:100%; overflow:hidden; background:var(--navy); }
.apk-header { display:flex; gap:0; flex-shrink:0; border-bottom:2px solid var(--border); }

.apk-col-header:last-child { border-right:none; }

}

  background:var(--navy-light); border:1px solid var(--border);

.apk-card[data-col="solid"]  { border-left-color: var(--accent); }
.apk-card[data-col="center"] { border-left-color: var(--blue-bright); }
.apk-card[data-col="ring"]   { border-left-color: #27ae60; }
.apk-card[data-col="pool"]   { border-left-color: var(--text-muted); opacity:0.8; }
.apk-card-name { font-weight:600; color:var(--text); font-size:13px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

</style>
<script>
async function loadAttackPlan(rep) {
  try {
    const rows = await sheetsGet("'_ATTACK_PLAN'!A1:F2000");
    if (rows.length < 2) return {};
    const hdrs = rows[0];
    const iRep  = hdrs.indexOf('REP');
    const iName = hdrs.indexOf('ACCOUNT_NAME');
    const iZone = hdrs.indexOf('ZONE');
    const iOrd  = hdrs.indexOf('POSITION');
    const plan = {};
    for (let r = 1; r < rows.length; r++) {
      const row = rows[r];
      const repKey = (row[iRep]||'').trim();
      if (!plan[repKey]) plan[repKey] = [];
      plan[repKey].push({
        name:  (row[iName]||'').trim(),
        zone:  (row[iZone]||'POOL').trim(),
        order: parseInt(row[iOrd]||'99'),
      });
    }
    return plan;
  } catch(e) { return {}; }
}

async function saveAttackPlan(rep, cards) {
  try {
    let rows;
    try {
      const existing = await sheetsGet("'_ATTACK_PLAN'!A1:F2000");
      rows = existing.length > 0 ? existing : [['REP','ACCOUNT_NAME','ZONE','POSITION','TOTAL','LAST_UPDATED']];
    } catch(e) {
      rows = [['REP','ACCOUNT_NAME','ZONE','POSITION','TOTAL','LAST_UPDATED']];
    }
    const filtered = rows.filter((r, i) => i === 0 || (r[0]||'').trim() !== rep);
    const now = new Date().toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    cards.forEach((c, i) => {
      const acc = state.accounts.find(a => a.name === c.name);
      filtered.push([rep, c.name, c.zone, i, acc ? formatNum(acc.total) : '', now]);
    });
    await sheetsUpdate("'_ATTACK_PLAN'!A1:F" + filtered.length, filtered);
    showToast('Attack plan saved ✓', 'success');
  } catch(e) {
    showToast('Error saving: ' + e.message, 'error');
  }
}

async function requestTransfer(accountName, fromRep) {
  const reason = prompt('Request transfer of "' + accountName + '" to your territory?\n\nAdd a note to John (optional):');
  if (reason === null) return;
  try {
    await sheetsAppend("'_LOG'!A1", [[
      new Date().toISOString(),
      state.user?.email || fromRep,
      'TRANSFER_REQUEST',
      'Rep ' + fromRep + ' requests transfer of: ' + accountName + '. Note: ' + (reason||'none'),
    ]]);
    showToast('Transfer request sent to John ✓', 'success');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function renderAttackPlan() {
  const content = document.getElementById('main-content');
  content.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-family:var(--font-mono)">LOADING ATTACK PLAN...</div>';

  const repFilter = state.isAdmin ? (state.viewAsRep || 'FJohn') : state.repId;
  if (!repFilter) {
    content.innerHTML = '<div style="padding:40px;color:var(--text-muted)">Select a rep to view their attack plan.</div>';
    return;
  }

  const allPlans = await loadAttackPlan(repFilter);
  const saved = allPlans[repFilter] || [];

  const repAccs = state.accounts
    .filter(a => a.rep === repFilter)
    .sort((a, b) => (b.total||0) - (a.total||0));

  const otherAccs = state.accounts
    .filter(a => a.rep !== repFilter)
    .sort((a, b) => (b.total||0) - (a.total||0))
    .slice(0, 30);

  // Build column data from saved or default
  const cols = { solid: [], center: [], ring: [], pool: [] };
  if (saved.length > 0) {
    const byZone = { solid: [], center: [], ring: [], pool: [] };
    saved.forEach(c => {
      const z = (c.zone||'pool').toLowerCase();
      if (byZone[z]) byZone[z].push({ ...c, order: c.order ?? 99 });
    });
    Object.keys(byZone).forEach(z => {
      byZone[z].sort((a,b) => a.order - b.order);
      cols[z] = byZone[z].map(c => c.name);
    });
    // Add any new accounts to pool
    const known = new Set(saved.map(c => c.name));
    repAccs.forEach(a => { if (!known.has(a.name)) cols.pool.push(a.name); });
  } else {
    // Default: top 10 solid, next 10 center, next 30 ring, rest pool
    repAccs.forEach((a, i) => {
      if (i < 10)      cols.solid.push(a.name);
      else if (i < 20) cols.center.push(a.name);
      else if (i < 50) cols.ring.push(a.name);
      else             cols.pool.push(a.name);
    });
  }

  const colDefs = [
    { key:'solid',  label:'★ Solid Core',     max:10, color:'var(--accent)',       desc:'Top 10 — guaranteed revenue, protect & grow' },
    { key:'center', label:'◈ Active Pursue',   max:10, color:'var(--blue-bright)',  desc:'Next 10 — high-potential, actively working' },
    { key:'ring',   label:'○ Outer Ring',      max:30, color:'#27ae60',             desc:'Top prospects — keep warm, grow when ready' },
  ];

  function cardHtml(name, col) {
    const acc = state.accounts.find(a => a.name === name);
    const statusTxt = (acc?.status||'').replace(/[🔴🟠⚫🟡]/g,'').trim();
    return `<div class="apk-card" data-name="${escHtml(name)}" data-col="${col}" draggable="true">
      <div class="apk-card-drag-handle">⠿</div>
      <div class="apk-card-name" title="${escHtml(name)}">${escHtml(name)}</div>
      <div class="apk-card-rev">$${formatNum(acc?.total||0)}</div>
      ${statusTxt ? `<div class="apk-card-status">${escHtml(statusTxt)}</div>` : ''}
    </div>`;
  }

  content.innerHTML = `
  <div class="apk-board">

    <!-- Column headers -->
    <div class="apk-header">
      ${colDefs.map(c => {
        const count = cols[c.key].length;
        const pct   = Math.min(100, Math.round(count / c.max * 100));
        return `<div class="apk-col-header">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="color:${c.color}">${c.label}</span>
            <span style="font-size:11px;color:${count>=c.max?'#27ae60':'var(--text-muted)'}">${count}/${c.max}</span>
          </div>
          <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-main);text-transform:none;letter-spacing:0;font-weight:400">${c.desc}</div>
          <div class="apk-progress"><div class="apk-progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
        </div>`;
      }).join('')}
      <div class="apk-col-header" style="width:220px;min-width:220px;flex:none;border-right:none;border-left:1px solid var(--border)">
        <div style="color:var(--orange)">⇄ Transfer Candidates</div>
        <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-main);text-transform:none;letter-spacing:0;font-weight:400">Click to request from John</div>
        <div class="apk-progress"><div class="apk-progress-fill" style="width:100%;background:var(--orange);opacity:0.3"></div></div>
      </div>
    </div>

    <!-- Main columns + transfer panel -->
    <div style="display:flex;flex:1;min-height:0">

      <!-- 3 Kanban columns -->
      <div style="display:flex;flex:1;min-height:0;overflow:hidden">
        ${colDefs.map(c => `
          <div class="apk-col" id="apk-col-${c.key}" data-col="${c.key}"
            ondragover="apkDragOver(event)" ondragleave="apkDragLeave(event)" ondrop="apkDrop(event,'${c.key}')">
            ${cols[c.key].map(name => cardHtml(name, c.key)).join('')}
            ${cols[c.key].length === 0 ? `<div style="border:1px dashed var(--border);border-radius:4px;padding:20px;text-align:center;color:var(--text-muted);font-size:11px;font-family:var(--font-mono)">DROP HERE</div>` : ''}
          </div>`).join('')}
      </div>

      <!-- Transfer candidates panel -->
      <div class="apk-transfer-panel">
        <div style="flex:1;overflow-y:auto;padding:8px">
          ${otherAccs.map(acc => `
            <div class="apk-card" data-col="transfer" data-name="${escHtml(acc.name)}"
              style="cursor:pointer;border-left-color:var(--orange);background:rgba(211,84,0,0.06);margin-bottom:6px"
              onclick="requestTransfer('${escHtml(acc.name)}','${escHtml(repFilter)}')">
              <div class="apk-card-name" title="${escHtml(acc.name)}">${escHtml(acc.name)}</div>
              <div class="apk-card-rev">$${formatNum(acc.total||0)}</div>
              <div class="apk-card-status">${escHtml(acc.rep)}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Pool strip at bottom -->
    <div class="apk-pool-strip">
      <div class="apk-pool-header">
        <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.15em;color:var(--text-muted)">YOUR POOL — ${cols.pool.length} accounts</div>
        <div style="font-size:11px;color:var(--text-dim)">Drag up into any column · Drag column cards down here to remove from plan</div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button onclick="apkResetDefault('${escHtml(repFilter)}')"
            style="padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-mono);font-size:10px;cursor:pointer">
            RESET
          </button>
          <button onclick="apkSave('${escHtml(repFilter)}')"
            style="padding:5px 16px;background:var(--blue);border:none;color:white;font-family:var(--font-mono);font-size:11px;cursor:pointer;letter-spacing:0.05em">
            SAVE PLAN ✓
          </button>
        </div>
      </div>
      <div id="apk-pool" class="apk-pool-cards"
        ondragover="apkDragOver(event)" ondragleave="apkDragLeave(event)" ondrop="apkDrop(event,'pool')">
        ${cols.pool.map(name => cardHtml(name, 'pool')).join('')}
        ${cols.pool.length === 0 ? '<div style="color:var(--text-muted);font-size:11px;padding:12px 0;font-family:var(--font-mono)">All accounts assigned to plan</div>' : ''}
      </div>
    </div>

  </div>`;

  // Attach drag events to all cards
  apkBindCards();
}

// ── KANBAN DRAG ENGINE ──────────────────────────────────────
let apkDragging = null;
let apkClone    = null;

function apkBindCards() {
  document.querySelectorAll('.apk-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', apkDragStart);
    card.addEventListener('dragend',   apkDragEnd);
  });
}

function apkDragStart(e) {
  apkDragging = e.currentTarget;
  apkDragging.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', apkDragging.dataset.name);
}

function apkDragEnd(e) {
  if (apkDragging) apkDragging.classList.remove('dragging');
  document.querySelectorAll('.apk-col').forEach(c => c.classList.remove('drag-over'));
  document.getElementById('apk-pool')?.classList.remove('drag-over');
  apkDragging = null;
}

function apkDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const col = e.currentTarget;
  col.classList.add('drag-over');
}

function apkDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function apkDrop(e, targetCol) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!apkDragging) return;

  const name    = apkDragging.dataset.name;
  const fromCol = apkDragging.dataset.col;
  if (fromCol === targetCol) return;

  // Remove from source
  apkDragging.remove();

  // Check column limits
  const limits = { solid:10, center:10, ring:30, pool:9999 };
  const target = targetCol === 'pool'
    ? document.getElementById('apk-pool')
    : document.getElementById('apk-col-' + targetCol);
  if (!target) return;

  const currentCount = target.querySelectorAll('.apk-card').length;
  if (targetCol !== 'pool' && currentCount >= limits[targetCol]) {
    showToast(`${targetCol.toUpperCase()} is full (${limits[targetCol]} max) — move one out first`, 'error');
    // Put it back
    const src = fromCol === 'pool'
      ? document.getElementById('apk-pool')
      : document.getElementById('apk-col-' + fromCol);
    if (src) { apkDragging.classList.remove('dragging'); src.appendChild(apkDragging); }
    return;
  }

  // Build new card for target col
  const acc = state.accounts.find(a => a.name === name);
  const colColors = { solid:'var(--accent)', center:'var(--blue-bright)', ring:'#27ae60', pool:'var(--text-muted)' };
  const statusTxt = (acc?.status||'').replace(/[🔴🟠⚫🟡]/g,'').trim();
  const newCard = document.createElement('div');
  newCard.className = 'apk-card';
  newCard.dataset.name = name;
  newCard.dataset.col  = targetCol;
  newCard.draggable    = true;
  newCard.style.cssText = targetCol === 'pool' ? 'flex-shrink:0;width:160px' : '';
  newCard.innerHTML = `<div class="apk-card-drag-handle">⠿</div>
    <div class="apk-card-name" title="${escHtml(name)}">${escHtml(name)}</div>
    <div class="apk-card-rev">$${formatNum(acc?.total||0)}</div>
    ${statusTxt ? `<div class="apk-card-status">${escHtml(statusTxt)}</div>` : ''}`;
  newCard.addEventListener('dragstart', apkDragStart);
  newCard.addEventListener('dragend',   apkDragEnd);

  // Remove empty-state placeholder if present
  const placeholder = target.querySelector('div:not(.apk-card)');
  if (placeholder) placeholder.remove();

  target.appendChild(newCard);

  // Update progress bars
  apkUpdateHeaders();
}

function apkUpdateHeaders() {
  const colDefs = [
    { key:'solid',  max:10, color:'var(--accent)' },
    { key:'center', max:10, color:'var(--blue-bright)' },
    { key:'ring',   max:30, color:'#27ae60' },
  ];
  colDefs.forEach(c => {
    const col = document.getElementById('apk-col-' + c.key);
    if (!col) return;
    const count = col.querySelectorAll('.apk-card').length;
    const header = document.querySelector(`.apk-col-header:nth-child(${['solid','center','ring'].indexOf(c.key)+1})`);
    if (header) {
      const countEl = header.querySelector('span:last-child');
      const fill    = header.querySelector('.apk-progress-fill');
      if (countEl) { countEl.textContent = count + '/' + c.max; countEl.style.color = count >= c.max ? '#27ae60' : 'var(--text-muted)'; }
      if (fill)    fill.style.width = Math.min(100, Math.round(count/c.max*100)) + '%';
    }
  });
  // Update pool count
  const pool = document.getElementById('apk-pool');
  if (pool) {
    const poolHeader = document.querySelector('.apk-pool-header div:first-child');
    if (poolHeader) poolHeader.textContent = 'YOUR POOL — ' + pool.querySelectorAll('.apk-card').length + ' accounts';
  }
}

function apkSave(rep) {
  const cards = [];
  ['solid','center','ring'].forEach(col => {
    document.querySelectorAll(`#apk-col-${col} .apk-card`).forEach((el, i) => {
      cards.push({ name: el.dataset.name, zone: col.toUpperCase(), order: i });
    });
  });
  document.querySelectorAll('#apk-pool .apk-card').forEach((el, i) => {
    cards.push({ name: el.dataset.name, zone: 'POOL', order: i });
  });
  saveAttackPlan(rep, cards);
}

async function apkResetDefault(rep) {
  if (!confirm('Reset to default layout based on revenue? This clears your current arrangement.')) return;
  try {
    const rows = await sheetsGet("'_ATTACK_PLAN'!A1:F2000");
    if (rows.length > 1) {
      const filtered = rows.filter((r, i) => i === 0 || (r[0]||'').trim() !== rep);
      await sheetsUpdate("'_ATTACK_PLAN'!A1:F" + filtered.length, filtered);
    }
  } catch(e) {}
  renderAttackPlan();
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
async function init() {
  setLoading(true, 'CHECKING SESSION...', 10);

  const authed = await checkAuth();

  if (!authed) {
    setLoading(false);
    return;
  }

  // Saved session — show app directly
  completeLogin();
}

init();
</script>
